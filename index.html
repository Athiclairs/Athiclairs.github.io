<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>Document</title>
<!-- Custom favicon from icon/ folder -->
<link rel="icon" type="image/x-icon" href="icon/favicon.ico">
<link rel="icon" type="image/png" href="icon/logo.png">
<style>
  :root{
    --preview-desktop: 70vw;
    --preview-mobile: 90vw;
  }
  body{font-family:system-ui,Segoe UI,Roboto,Helvetica,Arial,sans-serif;max-width:64rem;margin:2rem auto;padding:0 1rem;line-height:1.45;background:#0d1117}
  header{display:flex;align-items:center;gap:1rem;margin-bottom:.75rem}
  .header-logo{height:2.5rem;width:auto}
  h1{margin:0;font-size:1.6rem}
  .pdf-list{list-style:none;padding:0;margin:0}
  .pdf-item{padding:.5rem 0;border-bottom:1px solid #f0f0f0}
  .pdf-header{margin-bottom:.3rem}
  .pdf-link{
    color:#0b66ff;
    font-weight:600;
    text-decoration:none;
    font-size:1rem;
  }
  .pdf-link:hover{text-decoration:underline}
  .preview-container{
    display:block;
    margin-top:.5rem;
  }
  .preview-wrapper{margin:0 auto;box-sizing:border-box;padding:0px;border:0px solid #ddd;background:#fff;width:var(--preview-desktop)}
  @media (max-width:700px){ .preview-wrapper{width:var(--preview-mobile)} }
  .preview-thumb{width:100%;height:auto;display:block;border:1px solid #eee;background:#fafafa}
  .no-thumb{font-size:.95rem;color:#6b7280;padding:.5rem}
</style>
</head>
<body>
  <header>
    <img class="header-logo" src="icon/logo.png" alt="Logo" onerror="this.style.display='none'">
    <h1>Document</h1>
  </header>

  <section>
    <ul class="pdf-list">
      <li class="pdf-item">
        <div class="pdf-header">
          <a class="pdf-link" href="https://athiclairs.github.io/pdfs/imo_p5_2026.pdf" target="_blank" rel="noopener">imo_p5_2026.pdf</a>
        </div>
        <div class="preview-container">
          <div class="preview-wrapper">
            <img class="preview-thumb" src="thumbs/imo_p5_2026.png" alt="Thumbnail for imo_p5_2026.pdf" />
            <div class="no-thumb" style="display:none">No preview available</div>
          </div>
        </div>
      </li>
      <li class="pdf-item">
        <div class="pdf-header">
          <a class="pdf-link" href="https://athiclairs.github.io/pdfs/mathematical_prob.pdf" target="_blank" rel="noopener">mathematical_prob.pdf</a>
        </div>
        <div class="preview-container">
          <div class="preview-wrapper">
            <img class="preview-thumb" src="thumbs/mathematical_prob.png" alt="Thumbnail for mathematical_prob.pdf" />
            <div class="no-thumb" style="display:none">No preview available</div>
          </div>
        </div>
      </li>
    </ul>
  </section>
</body>
</html>
